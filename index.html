<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- قطع الشبكة الصلب (A 1.809): سياسة أمن محتوى تحصر كل المصادر في أصل
         التطبيق المحلي فقط (و data:/blob: للصور المولدة و التصدير). أي طلب
         خارجي — حتى من رابط صورة محفوظ داخل سجل (image_url/logo_url/media) —
         يحجبه الـWebView نفسه قبل أن يلمس الشبكة. لا استثناء لأي نطاق. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: blob:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; media-src 'self' data: blob:; connect-src 'self' data: blob:; object-src 'none'; base-uri 'self'; form-action 'self'" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#2E7D32" />
    <title>Perfumes Process App برفيومز بروسس اب</title>
  </head>
  <body>
    <div id="root">
      <!-- Instant boot splash: static HTML shown on first paint (no JS needed),
           replaced automatically when React mounts. Kills the blank-white wait. -->
      <div id="boot-splash" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#FFFFFF;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;padding:24px;">
        <div style="width:92px;height:92px;border-radius:0;background:#3D9641;border:2px solid #2F7A33;"></div>
        <div style="margin-top:20px;font-size:17px;font-weight:700;letter-spacing:-0.02em;text-align:center;color:#2E7D32;">Perfumes Process App برفيومز بروسس اب</div>
        <div style="margin-top:18px;width:26px;height:26px;border:3px solid #e7e5e4;border-top-color:#2E7D32;border-radius:50%;animation:bootspin .8s linear infinite;"></div>
        <div style="margin-top:14px;font-size:10px;color:#a8a29e;letter-spacing:.02em;text-align:center;">Waiting has value · للانتظار قيمة</div>
      </div>
      <style>@keyframes bootspin{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
